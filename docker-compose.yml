services:
  postgres-discord-bot:
    image: 'postgres:latest'
    volumes:
      - "data:/var/lib/postgresql/data"
    environment:
      - POSTGRES_DB=neon
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      - DB_HOST=postgres-discord-bot

    command: >
      /bin/bash -c "npm run makemigrations && npm run build && npm run migrate && npm run start"

    depends_on:
      - postgres-discord-bot

volumes:
  data:
